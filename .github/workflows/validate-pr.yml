name: Validate PR
on:
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'schemas/**'
      - '.github/workflows/validate-pr.yml'

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Validate skills/*.json
        run: ./scripts/validate.sh

      - name: Build skillshare-hub.json
        run: ./scripts/build.sh

      - name: Auto-commit skillshare-hub.json if changed
        run: |
          if ! git diff --quiet --exit-code skillshare-hub.json 2>/dev/null || [ ! -f skillshare-hub.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add skillshare-hub.json
            git commit -m "chore: auto-build skillshare-hub.json [skip ci]"
            git push
          fi

  audit:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install skillshare
        run: |
          curl -fsSL https://raw.githubusercontent.com/runkids/skillshare/main/install.sh | sh
          skillshare version

      - name: Audit new skills
        id: audit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CI: "true"
          AUDIT_REPORT: /tmp/audit-report.md
          AUDIT_SARIF: /tmp/audit-results.sarif
        run: |
          ./scripts/audit.sh || echo "audit_failed=true" >> "$GITHUB_OUTPUT"
          [ -f /tmp/audit-report.md ] && echo "has_report=true" >> "$GITHUB_OUTPUT"
          [ -f /tmp/audit-results.sarif ] && echo "has_sarif=true" >> "$GITHUB_OUTPUT"

      - name: Comment PR with audit results
        if: always() && steps.audit.outputs.has_report == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # Delete previous audit comment if exists
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | startswith("## Skill Audit Results")) | .id' \
            | while read -r id; do
                gh api -X DELETE "repos/${REPO}/issues/comments/${id}"
              done

          # Truncate if report exceeds GitHub comment limit (65536 chars)
          REPORT=/tmp/audit-report.md
          if [ "$(wc -c < "$REPORT")" -gt 60000 ]; then
            head -c 59500 "$REPORT" > /tmp/audit-comment.md
            printf '\n\n---\n> **Truncated** — full report available in the [workflow summary](%s/%s/actions/runs/%s).\n' \
              "$SERVER_URL" "$REPO" "$RUN_ID" \
              >> /tmp/audit-comment.md
            REPORT=/tmp/audit-comment.md
          fi

          gh pr comment "${PR_NUMBER}" --body-file "$REPORT"

      - name: Show audit summary
        if: always() && steps.audit.outputs.has_report == 'true'
        run: cat /tmp/audit-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SARIF to Code Scanning
        if: always() && steps.audit.outputs.has_sarif == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: /tmp/audit-results.sarif
          category: skillshare-audit

      - name: Fail if audit failed
        if: steps.audit.outputs.audit_failed == 'true'
        run: exit 1
